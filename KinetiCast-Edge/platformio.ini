[platformio]
default_envs = m5atom_rocket, m5s3_ground

# ==========================================================
# 🚀 1. ロケット側 (AtomS3R + Camera)
# ==========================================================
[env:m5atom_rocket]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

# 💡 AtomS3Rの大容量フラッシュと高解像度駆動用の設定
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 8MB

build_src_filter = +<*> -<ground_receiver.cpp>

# 💡 カメラドライバ(esp32-camera)を依存関係に明示的に追加
lib_deps = 
    m5stack/M5Unified @ ^0.2.3
    esp32-camera

# 💡 PSRAMを有効化し、Wi-Fiとのキャッシュ衝突を防止するフラグ
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    
upload_port = COM11
monitor_port = COM11

before_upload = usb_reset
upload_flags =
    --before=default_reset
    --after=hard_reset

# ==========================================================
# 📡 2. 地上受信側 (AtomS3R + ディスプレイ)
# ==========================================================
[env:m5s3_ground]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

# 💡 地上側のAtomS3Rも同様に大容量フラッシュとPSRAMの設定を適用
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 8MB

build_src_filter = +<*> -<rocket_cam.cpp>

lib_deps = 
    m5stack/M5Unified @ ^0.2.3

# 💡 地上側も300KBの巨大バッファをPSRAMに確保するため、同じフラグを設定
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

upload_port = COM10
monitor_port = COM10

before_upload = usb_reset
upload_flags =
    --before=default_reset
    --after=hard_reset