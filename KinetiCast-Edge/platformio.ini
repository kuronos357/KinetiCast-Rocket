[platformio]
default_envs = m5atom_rocket, m5s3_ground

; ==========================================================
; 🚀 1. ロケット側 (AtomS3R-M12) の設定
; ==========================================================
[env:m5atom_rocket]
platform = espressif32
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200

lib_deps = 
    m5stack/M5Unified @ ^0.2.3

; 💡 新しい地上側のファイル名（ground_receiver.cpp）を除外します
build_src_filter = +<*> -<ground_receiver.cpp>

upload_port = COM11
monitor_port = COM11

; ==========================================================
; 📡 2. 地上受信側 (M5Stack S3系) の設定
; ==========================================================
[env:m5s3_ground]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200

lib_deps = 
    m5stack/M5Unified @ ^0.2.3

; 💡 新しいロケット側のファイル名（rocket_cam.cpp）を除外します
build_src_filter = +<*> -<rocket_cam.cpp>

upload_port = COM5
monitor_port = COM5