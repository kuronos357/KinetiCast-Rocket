[platformio]
default_envs = m5atom_rocket, m5s3_ground

; ==========================================================
; 🚀 1. ロケット側 (AtomS3R-M12)
; ==========================================================
[env:m5atom_rocket]
platform = espressif32
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
lib_deps = 
    m5stack/M5Unified @ ^0.2.3
build_src_filter = +<*> -<ground_receiver.cpp>
upload_port = COM11
monitor_port = COM11

before_upload = usb_reset
upload_flags =
    --before=default_reset
    --after=hard_reset

; ==========================================================
; 📡 2. 地上受信側 (M5Stack S3系 8MB Flash仕様)
; ==========================================================
[env:m5s3_ground]
platform = espressif32
; 💡 CoreS3定義(16MB)を破棄し、汎用S3の8MB構成に切り替えて不整合を根本治療します
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
framework = arduino
monitor_speed = 115200
lib_deps = 
    m5stack/M5Unified @ ^0.2.3
build_src_filter = +<*> -<rocket_cam.cpp>
upload_port = COM5
monitor_port = COM5

before_upload = usb_reset
upload_flags =
    --before=default_reset
    --after=hard_reset